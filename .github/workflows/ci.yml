name: ci

on:
  push:
  pull_request:

jobs:
  quality-and-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install base tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt

      - name: Ruff lint
        shell: pwsh
        run: |
          ruff check .

      - name: Mypy (gradual scope)
        shell: pwsh
        run: |
          python scripts/run_mypy.py

      - name: Validate JSON contracts
        shell: pwsh
        run: |
          python scripts/validate_json_contracts.py

      - name: Run operational checks
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/run_operational_checks.ps1

      - name: Run coverage gate
        shell: pwsh
        run: |
          python scripts/run_coverage.py

      - name: Ensure clean tracked tree after checks
        shell: bash
        run: |
          git diff --exit-code
          git diff --cached --exit-code
